name: Create Post
protocol: http
method: POST
url: "{{baseUrl}}/posts"
headers:
  - enabled: true
    name: Accept
    value: application/json
  - enabled: true
    name: X-Api-Version
    value: "{{apiVersion}}"
body_type: json
body: |
  {
    "title": "Hello",
    "body": "World",
    "userId": 1
  }
